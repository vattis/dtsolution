<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/layout :: head('로그인')}"></head>
<body class="bg-light min-vh-100 d-flex align-items-center">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-5 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4">로그인</h4>

                    <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                        아이디 또는 비밀번호가 올바르지 않습니다.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
                        로그아웃 되었습니다.
                    </div>
                    <div th:if="${successMessage}" class="alert alert-success py-2"
                         role="alert" th:text="${successMessage}"></div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">아이디</label>
                            <input type="text" id="username" name="username"
                                   class="form-control"
                                   placeholder="아이디 입력"
                                   autocomplete="username"
                                   th:value="${param.username}"
                                   required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">비밀번호</label>
                            <div class="input-group">
                                <input type="password" id="password" name="password"
                                       class="form-control"
                                       placeholder="비밀번호 입력"
                                       autocomplete="current-password"
                                       required>
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="togglePassword('password', this)"
                                        aria-label="비밀번호 표시/숨기기">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">로그인</button>
                        </div>
                    </form>

                    <div class="text-center">
                        <span class="text-muted">계정이 없으신가요?</span>
                        <a th:href="@{/signup}" class="ms-1">회원가입</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
    }
</script>
</body>
</html>
